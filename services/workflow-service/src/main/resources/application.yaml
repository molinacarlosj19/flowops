server:
  port: 8082

spring:
  application:
    name: workflow-service

  datasource:
    url: jdbc:postgresql://localhost:5440/flowops_workflow
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

